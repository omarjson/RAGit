name: 🐛 Bug report
description: Report a problem with RAGit
title: "[Bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! Please fill out the sections below.
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: How can we reproduce it?
      placeholder: |
        1. Open Models
        2. Launch ...
        3. Click ...
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / Arch
      placeholder: Windows 11 x64 / macOS 14 arm64 / Ubuntu 22.04
    validations:
      required: true
  - type: input
    id: hardware
    attributes:
      label: Hardware
      placeholder: RAM, GPU, VRAM
  - type: input
    id: model
    attributes:
      label: Model(s) used
      placeholder: qwen2.5-7b Q4_K_M
  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      description: Paste relevant logs. Redact any secrets.
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues
          required: true
